<svg width="100%" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: sans-serif; fill: #222; }
.th { font-size: 14px; font-weight: 500; }
.ts { font-size: 12px; font-weight: 400; }
.gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
.gray text { fill: #2C2C2A; }
.blue rect { fill: #E6F1FB; stroke: #185FA5; }
.blue text { fill: #042C53; }
.teal rect { fill: #E1F5EE; stroke: #0F6E56; }
.teal text { fill: #085041; }
.purple rect { fill: #EEEDFE; stroke: #534AB7; }
.purple text { fill: #26215C; }
.red rect { fill: #FCEBEB; stroke: #A32D2D; }
.red text { fill: #501313; }
</style>
</defs>

<!-- 每步开始 -->
<g class="gray">
  <rect x="240" y="20" width="200" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">schedule() 开始</text>
</g>
<text class="ts" x="340" y="76" text-anchor="middle">token_budget = max_num_scheduled_tokens</text>
<line x1="340" y1="82" x2="340" y2="106" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- RUNNING 队列 外框 -->
<rect x="60" y="106" width="560" height="260" rx="12" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="6 3"/>
<text class="ts" x="76" y="124" fill="#185FA5" font-weight="500">① RUNNING 队列</text>

<g class="blue">
  <rect x="160" y="132" width="360" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="146" text-anchor="middle" dominant-baseline="central">遍历 running 请求</text>
  <text class="ts" x="340" y="166" text-anchor="middle" dominant-baseline="central">num_new_tokens = num_tokens_with_spec - num_computed</text>
</g>

<line x1="340" y1="176" x2="340" y2="200" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

<g class="blue">
  <rect x="160" y="200" width="360" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="214" text-anchor="middle" dominant-baseline="central">allocate_slots()</text>
  <text class="ts" x="340" y="234" text-anchor="middle" dominant-baseline="central">尝试分配 KV cache block</text>
</g>

<!-- 分配失败分支 -->
<line x1="160" y1="222" x2="100" y2="222" stroke="#E24B4A" stroke-width="1" marker-end="url(#arrow)"/>
<g class="red">
  <rect x="62" y="200" width="96" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="110" y="214" text-anchor="middle" dominant-baseline="central">分配失败</text>
  <text class="ts" x="110" y="234" text-anchor="middle" dominant-baseline="central">抢占低优先级</text>
</g>

<line x1="340" y1="244" x2="340" y2="268" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

<g class="blue">
  <rect x="160" y="268" width="360" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="282" text-anchor="middle" dominant-baseline="central">token_budget -= num_new_tokens</text>
  <text class="ts" x="340" y="302" text-anchor="middle" dominant-baseline="central">加入 scheduled_running_reqs</text>
</g>

<!-- running 回环 -->
<line x1="160" y1="290" x2="120" y2="290" stroke="#888" stroke-width="1"/>
<line x1="120" y1="290" x2="120" y2="150" stroke="#888" stroke-width="1"/>
<line x1="120" y1="150" x2="160" y2="150" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="96" y="224" text-anchor="middle">next</text>

<line x1="340" y1="312" x2="340" y2="390" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- WAITING 队列 外框 -->
<rect x="60" y="390" width="560" height="400" rx="12" fill="none" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="6 3"/>
<text class="ts" x="76" y="408" fill="#0F6E56" font-weight="500">② WAITING 队列（新请求）</text>

<g class="teal">
  <rect x="160" y="416" width="360" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="430" text-anchor="middle" dominant-baseline="central">get_computed_blocks(request)</text>
  <text class="ts" x="340" y="450" text-anchor="middle" dominant-baseline="central">查本地 prefix cache，hash 匹配</text>
</g>

<line x1="340" y1="460" x2="340" y2="484" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

<g class="teal">
  <rect x="160" y="484" width="340" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="330" y="498" text-anchor="middle" dominant-baseline="central">connector.get_num_new_matched_tokens()</text>
  <text class="ts" x="330" y="518" text-anchor="middle" dominant-baseline="central">查外部 KV cache（可选）</text>
</g>

<!-- connector 返回 None 分支 -->
<line x1="500" y1="506" x2="540" y2="506" stroke="#E24B4A" stroke-width="1" marker-end="url(#arrow)"/>
<g class="red">
  <rect x="540" y="484" width="72" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="576" y="498" text-anchor="middle" dominant-baseline="central">None</text>
  <text class="ts" x="576" y="518" text-anchor="middle" dominant-baseline="central">跳过本轮</text>
</g>

<line x1="340" y1="528" x2="340" y2="552" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

<g class="teal">
  <rect x="160" y="552" width="360" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="566" text-anchor="middle" dominant-baseline="central">num_new_tokens = num_tokens - num_computed</text>
  <text class="ts" x="340" y="586" text-anchor="middle" dominant-baseline="central">chunked prefill 限流</text>
</g>

<line x1="340" y1="596" x2="340" y2="620" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

<g class="teal">
  <rect x="160" y="620" width="360" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="634" text-anchor="middle" dominant-baseline="central">allocate_slots()</text>
  <text class="ts" x="340" y="654" text-anchor="middle" dominant-baseline="central">分配 block，命中 block 直接复用</text>
</g>

<line x1="340" y1="664" x2="340" y2="688" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

<g class="teal">
  <rect x="160" y="688" width="360" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="702" text-anchor="middle" dominant-baseline="central">running.append(request)</text>
  <text class="ts" x="340" y="722" text-anchor="middle" dominant-baseline="central">token_budget -= num_new_tokens</text>
</g>

<!-- waiting 回环 -->
<line x1="160" y1="710" x2="120" y2="710" stroke="#888" stroke-width="1"/>
<line x1="120" y1="710" x2="120" y2="434" stroke="#888" stroke-width="1"/>
<line x1="120" y1="434" x2="160" y2="434" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="96" y="580" text-anchor="middle">next</text>

<line x1="340" y1="732" x2="340" y2="814" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 输出 -->
<g class="purple">
  <rect x="140" y="814" width="400" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="834" text-anchor="middle" dominant-baseline="central">③ 构造 SchedulerOutput</text>
  <text class="ts" x="340" y="856" text-anchor="middle" dominant-baseline="central">new_reqs / cached_reqs / num_scheduled_tokens / block_ids</text>
</g>

<line x1="340" y1="870" x2="340" y2="894" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

<g class="gray">
  <rect x="200" y="894" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="910" text-anchor="middle" dominant-baseline="central">发给 GPU worker 执行</text>
  <text class="ts" x="340" y="932" text-anchor="middle" dominant-baseline="central">下一步回到 schedule() 开始</text>
</g>

<!-- token budget 共享说明 -->
<line x1="628" y1="106" x2="628" y2="790" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="648" y="380" text-anchor="start" fill="#888">token</text>
<text class="ts" x="648" y="396" text-anchor="start" fill="#888">budget</text>
<text class="ts" x="648" y="412" text-anchor="start" fill="#888">共享</text>

</svg>
